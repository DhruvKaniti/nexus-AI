<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle with nodes -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#cyanGradient)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Orbital lines -->
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="url(#cyanGradient)" stroke-width="1" opacity="0.3" transform="rotate(0 100 100)"/>
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="url(#cyanGradient)" stroke-width="1" opacity="0.3" transform="rotate(60 100 100)"/>
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="url(#cyanGradient)" stroke-width="1" opacity="0.3" transform="rotate(120 100 100)"/>
  
  <!-- Nodes on the circle -->
  <circle cx="100" cy="15" r="4" fill="url(#cyanGradient)"/>
  <circle cx="167.5" cy="57.5" r="4" fill="url(#purpleGradient)"/>
  <circle cx="167.5" cy="142.5" r="4" fill="url(#purpleGradient)"/>
  <circle cx="100" cy="185" r="4" fill="url(#cyanGradient)"/>
  <circle cx="32.5" cy="142.5" r="4" fill="url(#purpleGradient)"/>
  <circle cx="32.5" cy="57.5" r="4" fill="url(#purpleGradient)"/>
  
  <!-- Central N logo -->
  <path d="M 65 75 L 65 125 L 85 125 L 115 95 L 145 125 L 145 75 L 125 75 L 100 100 L 75 75 Z" 
        fill="none" 
        stroke="url(#cyanGradient)" 
        stroke-width="6" 
        stroke-linejoin="round"
        stroke-linecap="round"/>
  
  <!-- Glow effect -->
  <path d="M 65 75 L 65 125 L 85 125 L 115 95 L 145 125 L 145 75 L 125 75 L 100 100 L 75 75 Z" 
        fill="none" 
        stroke="url(#cyanGradient)" 
        stroke-width="2" 
        stroke-linejoin="round"
        stroke-linecap="round"
        opacity="0.5"
        filter="blur(3px)"/>
</svg>